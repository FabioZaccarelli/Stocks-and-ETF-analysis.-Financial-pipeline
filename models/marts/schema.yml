version: 2

models:
  - name: prices_latest
    description: "Latest available price per ticker, derived from stg_prices."
    columns:
      - name: ticker
        description: "Ticker symbol of the financial instrument."
        tests:
          - not_null
          - unique

      - name: date
        description: "Most recent date available for this ticker."
        tests:
          - not_null

      - name: close
        description: "Closing price on the latest available date."
        tests:
          - not_null

      - name: high
        description: "Highest price on the latest available date."

      - name: low
        description: "Lowest price on the latest available date."

      - name: volume
        description: "Trading volume on the latest available date."
  - name: prices_daily
    description: "Cleaned daily historical prices for each ticker."
    columns:
     - name: date
       tests:
        - not_null
     - name: ticker
       tests:
        - not_null
     - name: close
       tests:
        - not_null
  - name: prices_with_sma
    description: "Daily prices enriched with 20-day Simple Moving Average."
    columns:
    - name: date
      tests:
        - not_null
    - name: ticker
      tests:
        - not_null
    - name: sma_20
      description: "20-day simple moving average of the closing price."
  - name: prices_with_indicators
    description: "Daily prices enriched with SMA, EMA and RSI."
    columns:
      - name: date
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: sma_20
        description: "20-day simple moving average of the closing price."
      - name: ema_20
        description: "20-day exponential moving average of the closing price (approximation)."
      - name: rsi_14
        description: "14-day Relative Strength Index based on gains and losses."

        
      
        